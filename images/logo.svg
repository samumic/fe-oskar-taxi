<svg width="520" height="120" viewBox="0 0 520 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
    <title id="title">Oskar Taxi Logo</title>
    <desc id="desc">Modernes Typografie-Logo für Oskar Taxi</desc>

    <style>
        .brand {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Helvetica, Arial, sans-serif;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 3px;
        fill: #ffff;
        }

        .accent {
        stroke: #c6a76b;
        stroke-width: 2;
        stroke-linecap: round;
        opacity: 0.95;
        }

        .dot {
        fill: #c6a76b;
        }
    </style>

    <!-- left accent -->
    <line class="accent" x1="24" y1="60" x2="84" y2="60" />
    <circle class="dot" cx="96" cy="60" r="3" />

    <!-- brand -->
    <text x="120" y="72" class="brand">OSKAR TAXI</text>

    <!-- right accent -->
    <circle class="dot" cx="398" cy="60" r="3" />
    <line class="accent" x1="410" y1="60" x2="496" y2="60" />
</svg>