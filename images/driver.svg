<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#2b2b2b"/>
        </linearGradient>
    </defs>

    <!-- background -->
    <rect width="400" height="400" rx="24" fill="url(#bg)"/>

    <!-- subtle gold ring -->
    <circle cx="200" cy="160" r="70" fill="none" stroke="#c6a76b" stroke-width="3" opacity="0.9"/>

    <!-- head -->
    <circle cx="200" cy="150" r="40" fill="#d9d9d9"/>

    <!-- shoulders -->
    <path d="M120 300
           Q200 230 280 300
           L280 330
           L120 330 Z"
          fill="#d9d9d9"/>

    <!-- label -->
    <text
            x="200"
            y="360"
            text-anchor="middle"
            font-family="Inter, Arial, sans-serif"
            font-size="18"
            fill="#c6a76b"
            letter-spacing="2"
    >
        CHAUFFEUR
    </text>
</svg>